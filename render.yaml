services:
  - type: web
    name: fragrance-workflow-api
    env: node
    plan: free
    buildCommand: ""
    startCommand: "node server.mjs"
    envVars:
      - key: ALLOWED_ORIGINS
        value: "https://japanese-fragrance.jp,https://www.japanese-fragrance.jp"
      - key: NOTION_VERSION
        value: "2026-03-11"
